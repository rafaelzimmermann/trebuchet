# trebuchet configuration
# Copy this file to ~/.config/trebuchet/trebuchet.conf to customise.
# Values may optionally be quoted: key = "value" or key = value


# ── Grid layout ───────────────────────────────────────────────────────────────

# Number of app columns in the grid.
columns = 7

# Number of app rows per page.
rows = 5

# Icon size in pixels (applies to both SVG and raster icons).
icon_size = 96


# ── AI assistant ──────────────────────────────────────────────────────────────
# Type  /ai <question>  in the search bar and press Enter to query an AI.
# Escape returns to the normal launcher.
#
# Define one [[ai_model]] block per provider. The model field accepts a
# comma-separated list — each model becomes an entry in the picker shown at
# the bottom-left of the AI panel, labelled "provider:model".
# The first model in the first block is the default.
#
# Supported providers: openai | anthropic | gemini | ollama
#
# Example:
#
# [[ai_model]]
# provider = anthropic
# api_key  = sk-ant-api03-...
# model    = claude-sonnet-4-6, claude-opus-4-6
#
# [[ai_model]]
# provider = openai
# api_key  = sk-proj-...
# model    = gpt-4o, gpt-4-turbo
#
# [[ai_model]]
# provider = ollama
# model    = llama3.2, mistral
# # base_url = http://localhost:11434   (default)
#
#
# --- Single-model shorthand (legacy, still supported) ---
#
# ai_provider = openai
# ai_api_key  = sk-proj-...
# ai_model    = gpt-4o


# ── Custom commands ────────────────────────────────────────────────────────────
# Define keyboard shortcuts that run shell commands directly from the launcher.
# Type the prefix and press Enter to trigger the command.
#
# prefix         — the exact text to type in the search bar (e.g. /shutdown)
# command        — shell command to run (executed via sh -c)
# display_result — if true, capture stdout and display it in the response panel
#                  if false (default), run silently and close the launcher
#
# Example: power controls
#
# [[command]]
# prefix  = /shutdown
# command = shutdown -h now
#
# [[command]]
# prefix  = /reboot
# command = reboot
#
# Example: show command output in the response panel
#
# [[command]]
# prefix         = /uptime
# command        = uptime -p
# display_result = true
#
# [[command]]
# prefix         = /ip
# command        = ip -br addr show
# display_result = true
