# trebuchet configuration
# Copy this file to ~/.config/trebuchet/trebuchet.conf to customise.
# Values may optionally be quoted: key = "value" or key = value


# ── Grid layout ───────────────────────────────────────────────────────────────

# Number of app columns in the grid.
columns = 7

# Number of app rows per page.
rows = 5

# Icon size in pixels (applies to both SVG and raster icons).
icon_size = 96


# ── AI assistant ──────────────────────────────────────────────────────────────
# Type  /ai <question>  in the search bar and press Enter to query an AI.
# Escape returns to the normal launcher. Ctrl+C copies the response.
#
# Supported providers: openai | anthropic | gemini | ollama
#
# ai_provider = anthropic
#
#
# --- OpenAI ---
# Get your key at https://platform.openai.com/api-keys
# Default model: gpt-4o
#
# ai_provider = openai
# ai_api_key  = sk-proj-...
# ai_model    = gpt-4o
#
#
# --- Anthropic ---
# Get your key at https://console.anthropic.com/settings/keys
# Default model: claude-sonnet-4-6
#
# ai_provider = anthropic
# ai_api_key  = sk-ant-api03-...
# ai_model    = claude-sonnet-4-6
#
#
# --- Google Gemini ---
# Get your key at https://aistudio.google.com/app/apikey
# Default model: gemini-2.0-flash
#
# ai_provider = gemini
# ai_api_key  = AIza...
# ai_model    = gemini-2.0-flash
#
#
# --- Ollama (local, no key needed) ---
# Install Ollama from https://ollama.com and run: ollama pull llama3.2
# Default base URL: http://localhost:11434
# Default model:    llama3.2
#
# ai_provider = ollama
# ai_model    = llama3.2
# ai_base_url = http://localhost:11434
